name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm install (e nao npm ci) porque o package-lock pode ficar
      # defasado quando dependencias sao editadas sem npm local.
      - name: Instalar dependências
        run: npm install

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build
